<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Matchday — World Cup 2026</title>
<meta name="theme-color" content="#0A0A0B">
<link rel="manifest" href="manifest.json">
<style>
  @font-face {
    font-family: 'DSDigital';
    src: local('Courier New');
  }

  :root{
    --bg: #0A0A0B;
    --bg-2: #16151A;
    --board: #18171C;
    --board-edge: #2A2730;
    --gold: #C9A24B;
    --gold-bright: #E8C470;
    --gold-dim: #6B5526;
    --ink: #F2EFE9;
    --ink-dim: #C7C2B8;
    --red-live: #D33B30;
    --green-go: #3FA86B;
    --text-soft: #8B8790;
    --hairline: rgba(242,239,233,0.08);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0;
    background-color: var(--bg);
    background-image:
      radial-gradient(120% 90% at 50% -10%, var(--bg-2), var(--bg) 55%),
      repeating-linear-gradient(180deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
    color: var(--ink);
    font-family: 'Courier New', ui-monospace, 'SF Mono', monospace;
    min-height: 100vh;
    position: relative;
  }

  /* Giant ghosted "26" watermark — references the tournament year, not the official mark */
  body::before{
    content: '26';
    position: fixed;
    top: -4vw; right: -4vw;
    font-family: Georgia, serif;
    font-weight: 900;
    font-size: 52vw;
    line-height: 1;
    color: rgba(201,162,75,0.025);
    z-index: 0;
    pointer-events: none;
    letter-spacing: -0.04em;
  }

  header, main, .bottom-nav, .settings-panel{ position: relative; z-index: 1; }

  body{
    padding-bottom: 90px;
  }

  /* ---------- Header ---------- */
  header{
    position: sticky; top:0; z-index: 20;
    background: linear-gradient(180deg, var(--bg) 70%, transparent);
    padding: 18px 16px 10px;
    backdrop-filter: blur(6px);
  }

  .brand{
    display:flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 14px;
  }
  .brand h1{
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 700;
    letter-spacing: 0.5px;
    font-size: 22px;
    margin:0;
    color: var(--ink);
  }
  .brand h1 span{
    color: var(--gold);
    font-style: italic;
  }
  .brand .clock{
    font-size: 12px;
    color: var(--text-soft);
    letter-spacing: 1px;
  }

  .day-strip{
    display:flex; gap:8px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: none;
  }
  .day-strip::-webkit-scrollbar{ display:none; }

  .day-pill{
    flex: 0 0 auto;
    border: 1px solid var(--hairline);
    border-radius: 3px;
    padding: 8px 12px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-soft);
    background: rgba(255,255,255,0.02);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s ease;
  }
  .day-pill.has-match{ color: var(--ink); }
  .day-pill.active{
    background: var(--gold);
    color: #1A1206;
    border-color: var(--gold);
    font-weight: 700;
  }
  .day-pill .dot{
    display:inline-block; width:5px; height:5px; border-radius:50%;
    background: var(--green-go); margin-left:6px; vertical-align:middle;
  }
  .day-pill.active .dot{ background: #1A1206; }

  /* ---------- Board ---------- */
  main{ padding: 14px 16px 0; max-width: 720px; margin: 0 auto; }

  .board-date{
    display:flex; align-items:baseline; justify-content: space-between;
    margin: 18px 2px 10px;
  }
  .board-date h2{
    font-family: Georgia, serif;
    font-size: 17px;
    margin:0;
    font-weight: 700;
    color: var(--ink);
  }
  .board-date .count{
    font-size: 11px; color: var(--text-soft); letter-spacing: 1px;
  }

  .empty-state{
    text-align:center;
    padding: 60px 20px;
    color: var(--text-soft);
    font-size: 13px;
    line-height: 1.8;
  }
  .empty-state .big{
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 18px;
    color: var(--ink-dim);
    display:block;
    margin-bottom: 8px;
  }

  .match-row{
    background: linear-gradient(180deg, var(--board), #121116);
    border: 1px solid var(--board-edge);
    border-radius: 4px;
    margin-bottom: 10px;
    overflow: hidden;
    position: relative;
  }
  .match-row::before{
    content:'';
    position:absolute; left:0; top:0; bottom:0; width:3px;
    background: var(--gold-dim);
  }
  .match-row.live::before{ background: var(--red-live); }
  .match-row.finished::before{ background: var(--text-soft); opacity:0.4; }

  .match-main{
    display:flex; align-items:center; justify-content: space-between;
    padding: 14px 14px 14px 18px;
    gap: 12px;
  }

  .match-time{
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--ink);
    min-width: 64px;
    font-variant-numeric: tabular-nums;
  }
  .match-time.live{ color: var(--red-live); }
  .match-time.past{ color: var(--text-soft); }

  .match-info{ flex:1; min-width:0; }
  .match-stage{
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .teams-row{
    display:flex; align-items:center; gap: 7px;
    flex-wrap: wrap;
  }
  .flag-img{
    width: 22px; height: 16px;
    object-fit: cover;
    border-radius: 2px;
    box-shadow: 0 0 0 1px rgba(242,239,233,0.15);
    flex-shrink: 0;
    background: var(--board-edge);
  }
  .flag-placeholder{
    width: 22px; height: 16px;
    border-radius: 2px;
    background: var(--board-edge);
    box-shadow: 0 0 0 1px rgba(242,239,233,0.1);
    flex-shrink: 0;
  }
  .match-teams{
    font-size: 13.5px;
    color: var(--ink);
    font-weight: 700;
    letter-spacing: 0.2px;
    max-width: 38vw;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .vs-sep{
    color: var(--gold);
    font-size: 10px;
    font-weight: 400;
    opacity: 0.7;
    flex-shrink: 0;
  }
  .match-venue{
    font-size: 10.5px;
    color: var(--text-soft);
    margin-top: 5px;
    letter-spacing: 0.5px;
  }

  .match-score{
    font-size: 16px;
    font-weight: 700;
    color: var(--ink-dim);
    letter-spacing: 1px;
    min-width: 40px;
    text-align: right;
  }

  .bell-btn{
    flex: 0 0 auto;
    width: 38px; height: 38px;
    border-radius: 3px;
    border: 1px solid var(--hairline);
    background: rgba(255,255,255,0.03);
    color: var(--text-soft);
    display:flex; align-items:center; justify-content:center;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .bell-btn svg{ width:17px; height:17px; }
  .bell-btn.active{
    background: var(--gold);
    border-color: var(--gold);
    color: #1A1206;
  }
  .bell-btn:active{ transform: scale(0.92); }
  .bell-btn.disabled{ opacity: 0.3; cursor: default; }

  .live-tag{
    font-size: 9px;
    background: var(--red-live);
    color: #fff;
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 1px;
    font-weight: 700;
    margin-left: 8px;
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:0.4} }

  .match-score.live{
    color: var(--red-live);
  }
  .minute-tag{
    font-size: 10px;
    color: var(--red-live);
    display:block;
    margin-top: 2px;
    text-align: right;
  }

  .sync-status{
    font-size: 10px;
    color: var(--text-soft);
    text-align: center;
    padding: 8px 0 2px;
    letter-spacing: 0.5px;
  }
  .sync-status.err{ color: var(--gold); }

  /* ---------- Today banner ---------- */
  .today-banner{
    background: linear-gradient(135deg, #18351F, #0F2417);
    border: 1px solid var(--green-go);
    border-radius: 4px;
    padding: 12px 16px;
    margin: 0 0 16px;
    font-size: 12px;
    color: var(--ink-dim);
    display:flex; align-items:center; gap:10px;
  }
  .today-banner svg{ width:18px; height:18px; flex-shrink:0; color: var(--green-go); }

  /* ---------- Bottom nav ---------- */
  .bottom-nav{
    position: fixed; bottom:0; left:0; right:0;
    background: var(--bg);
    border-top: 1px solid var(--hairline);
    display:flex;
    padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
    z-index: 30;
  }
  .nav-btn{
    flex:1; text-align:center;
    background:none; border:none;
    color: var(--text-soft);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 0;
    cursor:pointer;
  }
  .nav-btn.active{ color: var(--gold); }
  .nav-btn .ic{ display:block; margin: 0 auto 4px; width:20px; height:20px; }

  /* ---------- Settings panel ---------- */
  .settings-panel{
    display:none;
    padding: 14px 16px 40px;
    max-width: 720px; margin: 0 auto;
  }
  .settings-panel.open{ display:block; }
  .settings-panel h2{
    font-family: Georgia, serif; font-size:18px; margin: 10px 0 16px;
  }
  .setting-row{
    background: var(--board);
    border: 1px solid var(--board-edge);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display:flex; align-items:center; justify-content:space-between;
    gap: 12px;
  }
  .setting-row .label{ font-size:13px; color: var(--ink); }
  .setting-row .sub{ font-size:11px; color: var(--text-soft); margin-top:3px; }

  .toggle{
    width: 44px; height: 24px;
    border-radius: 12px;
    background: var(--board-edge);
    position: relative;
    cursor: pointer;
    flex-shrink:0;
    border: 1px solid var(--hairline);
  }
  .toggle.on{ background: var(--gold); }
  .toggle .knob{
    width: 18px; height:18px; border-radius:50%;
    background: var(--ink);
    position:absolute; top:2px; left:2px;
    transition: left 0.15s ease;
  }
  .toggle.on .knob{ left: 23px; background:#1A1206; }

  select{
    background: var(--bg-2);
    color: var(--ink);
    border: 1px solid var(--hairline);
    border-radius: 3px;
    padding: 6px 8px;
    font-family: inherit;
    font-size: 12px;
  }

  .perm-banner{
    background: rgba(242,169,59,0.1);
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--ink-dim);
    margin-bottom: 14px;
    line-height: 1.6;
  }
  .perm-banner button{
    background: var(--gold);
    color: #1A1206;
    border:none;
    border-radius: 3px;
    padding: 8px 14px;
    font-family: inherit;
    font-weight:700;
    font-size: 11px;
    letter-spacing: 0.5px;
    margin-top: 8px;
    cursor:pointer;
  }

  .toast{
    position: fixed;
    bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--gold);
    color: #1A1206;
    padding: 10px 18px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.25s ease;
    z-index: 50;
    white-space: nowrap;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Match<span>day</span></h1>
    <div class="clock" id="liveClock">—</div>
  </div>
  <div class="day-strip" id="dayStrip"></div>
  <div class="sync-status" id="syncStatus">Loading live scores…</div>
</header>

<main id="boardView">
  <div id="todayBannerSlot"></div>
  <div id="boardContent"></div>
</main>

<div class="settings-panel" id="settingsView">
  <h2>Settings</h2>
  <div id="permBannerSlot"></div>

  <div class="setting-row">
    <div>
      <div class="label">Match notifications</div>
      <div class="sub">Get notified before kickoff</div>
    </div>
    <div class="toggle" id="masterToggle"><div class="knob"></div></div>
  </div>

  <div class="setting-row">
    <div>
      <div class="label">Remind me before</div>
      <div class="sub">How early to send the alert</div>
    </div>
    <select id="leadTime">
      <option value="60">1 hour</option>
      <option value="30" selected>30 minutes</option>
      <option value="15">15 minutes</option>
      <option value="5">5 minutes</option>
    </select>
  </div>

  <div class="setting-row">
    <div>
      <div class="label">Daily digest</div>
      <div class="sub">Morning summary of today's matches</div>
    </div>
    <div class="toggle" id="digestToggle"><div class="knob"></div></div>
  </div>

  <div class="setting-row" style="flex-direction:column; align-items:flex-start;">
    <div class="label" style="margin-bottom:8px;">Bell-marked matches</div>
    <div class="sub" id="bellSummary">No matches starred yet — tap the bell icon next to any match.</div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="navBoard">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="1"/><path d="M3 9h18M8 4v3M16 4v3"/></svg>
    Schedule
  </button>
  <button class="nav-btn" id="navSettings">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 005 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 005 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 5a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09A1.65 1.65 0 0015 5a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Settings
  </button>
</nav>

<div class="toast" id="toast"></div>

<script src="matches_data.js"></script>
<script>
(function(){
  const $ = (id) => document.getElementById(id);

  // ---------- State ----------
  const STORE_KEY = 'matchday_bells_v1';
  const SETTINGS_KEY = 'matchday_settings_v1';
  let bells = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
  let settings = Object.assign({ master: true, leadTime: 30, digest: false }, JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}'));
  let timers = {}; // matchId -> timeout id (in-session fallback)

  function saveBells(){ localStorage.setItem(STORE_KEY, JSON.stringify(bells)); }
  function saveSettings(){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }

  // ---------- Date helpers ----------
  function dayKey(iso){
    const d = new Date(iso);
    return d.toLocaleDateString('en-CA'); // YYYY-MM-DD in local tz
  }  function fmtTime(iso){
    const d = new Date(iso);
    return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }
  function fmtDayLabel(key){
    const d = new Date(key + 'T12:00:00');
    return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  }
  function fmtDayLong(key){
    const d = new Date(key + 'T12:00:00');
    return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
  }

  // Group matches by day
  const byDay = {};
  MATCHES.forEach(m => {
    const k = dayKey(m.kickoff);
    if(!byDay[k]) byDay[k] = [];
    byDay[k].push(m);
  });
  const dayKeys = Object.keys(byDay).sort();

  const todayKey = new Date().toLocaleDateString('en-CA');
  let activeDay = byDay[todayKey] ? todayKey : (dayKeys.find(k => k >= todayKey) || dayKeys[0]);

  // ---------- Live score layer ----------
  // Live data is fetched from our own Netlify Function (keeps the API key private)
  // and merged onto the static MATCHES list by matching date + team names.
  const SCORES_ENDPOINT = '/.netlify/functions/scores';
  let liveById = {}; // MATCHES.id -> { status, minute, homeScore, awayScore }
  let lastSync = null;

  function normTeam(name){
    if(!name) return '';
    return name.toLowerCase()
      .replace(/republic of korea|korea republic/, 'south korea')
      .replace(/czechia/, 'czech republic')
      .replace(/ivory coast|côte d.ivoire/, 'ivory coast')
      .replace(/dr congo|congo dr/, 'dr congo')
      .replace(/usa|united states/, 'usa')
      .replace(/[^a-z]/g, '');
  }

  function teamsMatch(localTeams, apiHome, apiAway){
    // localTeams like "England vs Croatia"
    const parts = localTeams.split(' vs ').map(normTeam);
    if(parts.length !== 2) return false;
    const h = normTeam(apiHome), a = normTeam(apiAway);
    return (parts[0].includes(h) || h.includes(parts[0])) && (parts[1].includes(a) || a.includes(parts[1]))
        || (parts[0].includes(a) || a.includes(parts[0])) && (parts[1].includes(h) || h.includes(parts[1]));
  }

  function mergeLiveData(apiMatches){
    liveById = {};
    apiMatches.forEach(am => {
      const apiDay = dayKey(am.utcDate);
      const candidate = MATCHES.find(m => dayKey(m.kickoff) === apiDay && teamsMatch(m.teams, am.homeTeam, am.awayTeam));
      if(candidate){
        liveById[candidate.id] = {
          status: am.status,
          minute: am.minute,
          homeScore: am.homeScore,
          awayScore: am.awayScore,
        };
      }
    });
  }

  async function syncLiveScores(){
    const statusEl = document.getElementById('syncStatus');
    try{
      const res = await fetch(SCORES_ENDPOINT, { cache: 'no-store' });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if(data.error) throw new Error(data.error);
      mergeLiveData(data.matches || []);
      lastSync = new Date();
      statusEl.classList.remove('err');
      statusEl.textContent = 'Live scores synced · ' + lastSync.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
      renderBoard();
    } catch(err){
      statusEl.classList.add('err');
      statusEl.textContent = lastSync
        ? 'Live sync failed — showing last update from ' + lastSync.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })
        : 'Live scores unavailable right now — showing schedule only';
    }
  }


  // ---------- Render day strip ----------
  function renderDayStrip(){
    const strip = $('dayStrip');
    strip.innerHTML = '';
    dayKeys.forEach(k => {
      const pill = document.createElement('div');
      pill.className = 'day-pill' + (byDay[k].length ? ' has-match' : '') + (k === activeDay ? ' active' : '');
      const isToday = k === todayKey;
      pill.innerHTML = (isToday ? 'Today · ' : '') + fmtDayLabel(k) + (isToday ? '<span class="dot"></span>' : '');
      pill.onclick = () => { activeDay = k; renderDayStrip(); renderBoard(); };
      strip.appendChild(pill);
    });
    // scroll active into view
    requestAnimationFrame(() => {
      const activeEl = strip.querySelector('.active');
      if(activeEl) activeEl.scrollIntoView({ inline: 'center', behavior: 'instant' });
    });
  }

  // ---------- Render board ----------
  function matchStatus(m){
    const live = liveById[m.id];
    if(live){
      if(live.status === 'IN_PLAY' || live.status === 'PAUSED') return 'live';
      if(live.status === 'FINISHED' || live.status === 'AWARDED') return 'finished';
      if(live.status === 'POSTPONED' || live.status === 'SUSPENDED' || live.status === 'CANCELLED') return 'upcoming';
      // SCHEDULED / TIMED fall through to time-based check below
    }
    const start = new Date(m.kickoff).getTime();
    const now = Date.now();
    const ninety = 105 * 60 * 1000; // assume ~105 min match window
    if(m.status === 'FT' || (now > start + ninety)) return 'finished';
    if(now >= start && now <= start + ninety) return 'live';
    return 'upcoming';
  }

  function renderTodayBanner(){
    const slot = $('todayBannerSlot');
    if(activeDay !== todayKey){ slot.innerHTML = ''; return; }
    const todays = byDay[todayKey] || [];
    const upcoming = todays.filter(m => matchStatus(m) === 'upcoming');
    const live = todays.filter(m => matchStatus(m) === 'live');
    let msg;
    if(live.length){
      msg = live.length + ' match' + (live.length>1?'es':'') + ' live right now';
    } else if(upcoming.length){
      const next = upcoming[0];
      msg = 'Next up: ' + next.teams + ' at ' + fmtTime(next.kickoff);
    } else {
      msg = 'All of today\'s matches have finished';
    }
    slot.innerHTML = `<div class="today-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <span>${msg}</span>
    </div>`;
  }

  function bellSvg(filled){
    return `<svg viewBox="0 0 24 24" fill="${filled ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>`;
  }

  function renderTeamsRow(teamsStr){
    // Splits "England vs Croatia" into flag+name pairs. Falls back gracefully
    // for knockout placeholders like "Match 73: Group A R-up vs Group B R-up".
    const parts = teamsStr.split(' vs ');
    if(parts.length !== 2){
      return `<div class="match-teams">${teamsStr}</div>`;
    }
    const [home, away] = parts;
    const homeUrl = flagUrl(home);
    const awayUrl = flagUrl(away);
    const homeFlag = homeUrl ? `<img class="flag-img" src="${homeUrl}" alt="" loading="lazy">` : `<span class="flag-placeholder"></span>`;
    const awayFlag = awayUrl ? `<img class="flag-img" src="${awayUrl}" alt="" loading="lazy">` : `<span class="flag-placeholder"></span>`;
    return `<div class="teams-row">
      ${homeFlag}
      <span class="match-teams">${home}</span>
      <span class="vs-sep">v</span>
      ${awayFlag}
      <span class="match-teams">${away}</span>
    </div>`;
  }

  function renderBoard(){
    renderTodayBanner();
    const content = $('boardContent');
    const matches = (byDay[activeDay] || []).slice().sort((a,b) => new Date(a.kickoff) - new Date(b.kickoff));

    const dateHeader = `<div class="board-date">
      <h2>${fmtDayLong(activeDay)}</h2>
      <div class="count">${matches.length} MATCH${matches.length === 1 ? '' : 'ES'}</div>
    </div>`;

    if(!matches.length){
      content.innerHTML = dateHeader + `<div class="empty-state">
        <span class="big">Rest day</span>
        No fixtures scheduled for this date.
      </div>`;
      return;
    }

    let html = dateHeader;
    matches.forEach(m => {
      const status = matchStatus(m);
      const isBelled = !!bells[m.id];
      const canBell = status === 'upcoming';
      const live = liveById[m.id];

      let scoreDisplay = '';
      if(live && (live.homeScore !== null && live.homeScore !== undefined)){
        scoreDisplay = `${live.homeScore}-${live.awayScore}`;
      } else if(m.score){
        scoreDisplay = m.score;
      }

      const minuteDisplay = (status === 'live' && live && live.minute) ? `${live.minute}'` : '';

      html += `<div class="match-row ${status}">
        <div class="match-main">
          <div class="match-time ${status === 'live' ? 'live' : (status === 'finished' ? 'past' : '')}">${fmtTime(m.kickoff)}</div>
          <div class="match-info">
            <div class="match-stage">${m.stage}${status === 'live' ? '<span class="live-tag">LIVE</span>' : ''}</div>
            ${renderTeamsRow(m.teams)}
            <div class="match-venue">${m.venue}</div>
          </div>
          ${scoreDisplay ? `<div><div class="match-score ${status === 'live' ? 'live' : ''}">${scoreDisplay}</div>${minuteDisplay ? `<span class="minute-tag">${minuteDisplay}</span>` : ''}</div>` : ''}
          <div class="bell-btn ${isBelled ? 'active' : ''} ${canBell ? '' : 'disabled'}" data-id="${m.id}">
            ${bellSvg(isBelled)}
          </div>
        </div>
      </div>`;
    });
    content.innerHTML = html;

    content.querySelectorAll('.bell-btn').forEach(btn => {
      btn.onclick = () => {
        if(btn.classList.contains('disabled')) return;
        const id = btn.dataset.id;
        toggleBell(id);
      };
    });
  }

  // ---------- Notifications ----------
  function notifPermission(){ return ('Notification' in window) ? Notification.permission : 'unsupported'; }

  async function requestPermission(){
    if(!('Notification' in window)){
      showToast('Notifications not supported in this browser');
      return false;
    }
    const res = await Notification.requestPermission();
    renderSettings();
    return res === 'granted';
  }

  function scheduleNotification(match){
    const leadMs = (settings.leadTime || 30) * 60 * 1000;
    const fireAt = new Date(match.kickoff).getTime() - leadMs;
    const delay = fireAt - Date.now();
    if(timers[match.id]) clearTimeout(timers[match.id]);
    if(delay <= 0) return; // too late to schedule in-session
    timers[match.id] = setTimeout(() => {
      fireNotification(
        '⚽ Kicking off soon',
        `${match.teams} — ${settings.leadTime} min to kickoff (${fmtTime(match.kickoff)})`
      );
    }, delay);
  }

  function fireNotification(title, body){
    if(notifPermission() !== 'granted') return;
    if('serviceWorker' in navigator && navigator.serviceWorker.controller){
      navigator.serviceWorker.ready.then(reg => reg.showNotification(title, { body, icon: 'icon.png', vibrate: [200,100,200] }));
    } else {
      new Notification(title, { body });
    }
  }

  async function toggleBell(id){
    const match = MATCHES.find(m => String(m.id) === String(id));
    if(!match) return;

    if(bells[id]){
      delete bells[id];
      if(timers[id]) { clearTimeout(timers[id]); delete timers[id]; }
      saveBells();
      renderBoard();
      showToast('Reminder removed');
      return;
    }

    if(notifPermission() !== 'granted'){
      const ok = await requestPermission();
      if(!ok){
        showToast('Enable notifications to set reminders');
        return;
      }
    }

    bells[id] = true;
    saveBells();
    scheduleNotification(match);
    renderBoard();
    showToast(`Reminder set — ${settings.leadTime} min before kickoff`);
  }

  function rescheduleAllBells(){
    Object.keys(bells).forEach(id => {
      const match = MATCHES.find(m => String(m.id) === String(id));
      if(match && matchStatus(match) === 'upcoming') scheduleNotification(match);
    });
  }

  // ---------- Settings view ----------
  function renderSettings(){
    const slot = $('permBannerSlot');
    const perm = notifPermission();
    if(perm !== 'granted'){
      slot.innerHTML = `<div class="perm-banner">
        Notifications are ${perm === 'denied' ? 'blocked' : 'not yet enabled'}. ${perm === 'denied' ? 'Enable them in your browser/site settings to get kickoff alerts.' : 'Turn them on to get kickoff alerts.'}
        ${perm !== 'denied' ? '<br><button id="enableNotifBtn">Enable notifications</button>' : ''}
      </div>`;
      const btn = $('enableNotifBtn');
      if(btn) btn.onclick = requestPermission;
    } else {
      slot.innerHTML = '';
    }

    $('masterToggle').classList.toggle('on', settings.master);
    $('digestToggle').classList.toggle('on', settings.digest);
    $('leadTime').value = String(settings.leadTime);

    const starred = Object.keys(bells).length;
    $('bellSummary').textContent = starred
      ? `${starred} match${starred>1?'es':''} starred for reminders.`
      : 'No matches starred yet — tap the bell icon next to any match.';
  }

  $('masterToggle').onclick = () => { settings.master = !settings.master; saveSettings(); renderSettings(); };
  $('digestToggle').onclick = () => { settings.digest = !settings.digest; saveSettings(); renderSettings(); };
  $('leadTime').onchange = (e) => { settings.leadTime = parseInt(e.target.value, 10); saveSettings(); rescheduleAllBells(); };

  // ---------- Nav ----------
  function showBoard(){
    $('boardView').style.display = '';
    $('settingsView').classList.remove('open');
    $('navBoard').classList.add('active');
    $('navSettings').classList.remove('active');
  }
  function showSettings(){
    $('boardView').style.display = 'none';
    $('settingsView').classList.add('open');
    $('navBoard').classList.remove('active');
    $('navSettings').classList.add('active');
    renderSettings();
  }
  $('navBoard').onclick = showBoard;
  $('navSettings').onclick = showSettings;

  // ---------- Toast ----------
  let toastTimer;
  function showToast(msg){
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ---------- Live clock ----------
  function tickClock(){
    const now = new Date();
    $('liveClock').textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' UK';
  }
  setInterval(tickClock, 1000);
  tickClock();

  // re-render every 30s to update live/finished states
  setInterval(() => { renderBoard(); }, 30000);

  // ---------- Service worker (for background-ish notifications) ----------
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // ---------- Init ----------
  renderDayStrip();
  renderBoard();
  rescheduleAllBells();
  syncLiveScores();
  setInterval(syncLiveScores, 60000); // refresh live scores every 60s
})();
</script>
</body>
</html>
